<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        // 1) array insinde array 
        let arr = [1, 2, 3, 4, [5, 6, 7, [8, 9]]]
        console.log(arr)
        console.log(arr[4][1])
        console.log(arr[4][3][1])


        // 2) object inside object 

        let person = {
            name: "het",
            age: 24,
            course: {
                front: "front-end",
                back: "back-end"
            }
        }

        console.log(person)
        console.log(person.name)
        console.log(person.course.front)


        // 3) array inside object

        let data = [1, 2, 3, {
            name: "dev"
        }, 56]

        console.log(data)
        console.log(data[3].name)


        // 4) object inside array

        let user = {
            name :"harsil",
            course : ["front-end","back-end","full-stack"]
        }

        console.log(user)
        console.log(user.course[2])
    </script>
</body>

</html>
