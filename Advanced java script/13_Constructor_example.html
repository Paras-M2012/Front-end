
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        class Cla{
            constructor(a,b){
                this.a = a;
                this.b = b;
                console.log("A : ",this.a)
                console.log("B : ",this.b)
            }
            sum(){
                console.log(`sum : ${this.a + this.b}`)
            }
             sub(){
                console.log(`sub : ${this.a - this.b}`)
            }
             mul(){
                console.log(`mul : ${this.a * this.b}`)
            }
             divi(){
                console.log(`divi : ${this.a / this.b}`)
            }
        }

        const data = new Cla(30,20)
        data.divi()
        data.mul()
        data.sub()
        data.sum()

    </script>
</body>
</html>
