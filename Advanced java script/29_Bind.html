<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <script>

         let data = {
            fullname: function () {
                console.log("fname :", this.fname, " lname :", this.lname)
            }
        }

        let perosn = {
            fname: "het",
            lname: "patel"
        }

        // as object created and function show
        let newdata = data.fullname.bind(perosn)
        newdata()


        let user = {
            mainname: function () {
                console.log("hname :", this.hname, "mname :", this.mname)
            }
        }

        let perosn1 = {
            hname: "Paras",
            mname: "Panchal"
        }

        let newuser = user.mainname.bind(perosn1)
        newuser()

    </script>
</body>
</html>
