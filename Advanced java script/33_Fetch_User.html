<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="5">
        <thead>
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Email</th>
                <th>City</th>
                <th>company</th>
            </tr>
        </thead>
            <tbody class="data">


            </tbody>
    </table>

    <script>
        fetch("https://jsonplaceholder.typicode.com/users",{
            method:"GET"
        })
        .then((res)=>{
            return res.json()
        })
        .then((res)=>{
            // console.log(res)
            res.forEach((data,index) => {
                console.log(data)

                let tbody = document.querySelector("tbody")
                let trow = tbody.insertRow

                let idcell = trow.insertCell(0)
                    let namecell = trow.insertCell(1)
                       let emailcell = trow.insertCell(2)
                            let Citycell = trow.insertCell(3)
                              let cpmpamycell = trow.insertCell(4)
                idcell.textContent = data.id
                    namecell.textContent = data.name
                    emailcell.textContent = data.email
                    Citycell.textContent = data.address.city
                    cpmpamycell.textContent = data.company.name
            });

        })
    </script>
</body>
</html>
