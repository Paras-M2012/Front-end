<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        fetch("data.json", {
            method: "GET"
        })

        .then((data)=>{
            return data.json()
        })
        .then((data)=>{
            console.log(data)
            data.forEach((user)=>{
                document.writeln(`<h2> id : ${user.id} Name : ${user.Name} age : ${user.age} Product : ${user.Product}</h2>`)
            });
        })
    </script>
</body>
</html>
