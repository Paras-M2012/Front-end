<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <table border="4" cellpadding="10" width="100%">
        <thead>
            <tr>
                <th>ID</th>
                <th>NAME</th>
                <th>LASTNAME</th>
                <th>EMAIL</th>
                <th>PHONE</th>
                <th>USERNAME</th>
                <th>PASSWORD</th>
                <th>CITY</th>
                <th>STREET</th>
                
            </tr>
        </thead>
        <tbody class="data">

        </tbody>
    </table>
    <script>
        fetch("https://fakestoreapi.com/users",{
            method: "GET"
        })
        .then((res) => {return res.json()})
        .then((res )=>{
            console.log(res)
            let htmldata = res.map((data) => {
                console.log(data)
                return (
                    `
                    <tr>
                        <td>${data.id}</td>
                        <td>${data.name.firstname}</td>
                        <td>${data.name.lastname}</td>
                        <td>${data.email}</td>
                        <td>${data.phone}</td>
                        <td>${data.username}</td>
                        <td>${data.password}</td>
                        <td>${data.address.city}</td>
                        <td>${data.address.street}</td>
                    </tr>

                    `
                )
            })
            document.querySelector("tbody").innerHTML = htmldata.join("")
        })
    </script>
</body>
</html>
