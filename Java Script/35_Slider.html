<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main {
            height: 400px;
            /* width: 100px; */
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div class="main">
        <img src="/Images/01.jpg" height="100%" width="100%" class="img" alt="">
        <img src="/Images/02.jpg" height="100%" width="100%" class="img" alt="">
        <img src="/Images/03.jpg" height="100%" width="100%" class="img" alt="">
        <img src="/Images/04.jpg" height="100%" width="100%" class="img" alt="">
        <img src="/Images/05.jpg" height="100%" width="100%" class="img" alt="">
        <img src="/Images/06.jpg" height="100%" width="100%" class="img" alt="">

    </div>

    <button>Click Me</button>

    <script>

        let img_tag = document.getElementsByClassName("img")
        console.log(img_tag)

        let index = 0

        function slider(){
            
            // all imges hidden
            for(let i=0;i<img_tag.length;i++){
                console.log(img_tag[i])
                img_tag[i].style.display = "none"
            }

            // single image show 
            img_tag[index].style.display = "block"
            index++

            if(index == 4){
                index = 0
            }

            setTimeout(slider,1000)
        }

        slider()
    </script>
</body>

</html>
