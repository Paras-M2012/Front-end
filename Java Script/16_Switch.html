<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        let a = 30, b = 20
        let choice = "()"

        switch (choice) {
            case '+':
                console.log("Sum : ", a + b)
                break;
            case '-':
                console.log("Sub : ", a - b)
                break;
            case '*':
                console.log("mul : ", a * b)
                break;
            case '/':
                console.log("divi : ", a / b)
                break;
            default:
                console.log("Invalid symbols")
                break;
        }

    </script>
</body>

</html>
