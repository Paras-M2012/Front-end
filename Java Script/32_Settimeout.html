<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        // 1) setinterval : 1s : contiue

        function demo(){
            console.log("Hello inteval")
            document.writeln("Hello <br>")
        }

        // clear interval

        setInterval(demo,1000)

        function demo2(){
            console.log("Hello Timeout")
        }

        // 2) settiout : evenry 1 stop 
        setTimeout(demo2,1000)


    </script>
</body>
</html>
