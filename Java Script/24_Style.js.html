<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- mouse Enter and leave -->

    <h1 id="demo" onmouseenter="demo()" onmouseleave="demo2()">Hello this Style data</h1>

    <button onclick="demo()">Style add</button>

    <script>

        let h1_tag = document.getElementById("demo")

        function demo(){
            h1_tag.style.background = "red"
            h1_tag.style.color = "white"
            h1_tag.style.fontSize = "50px"
        }

        function demo2(){
            h1_tag.style.background = "white"
            h1_tag.style.color = "black"
            h1_tag.style.fontSize = "30px"
        }

    </script>

</body>
</html>
