<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .st {
            background: linear-gradient(red, green, blue);
            color: white;
            text-align: center;
            padding: 40px;
            font-size: 50px;
        }
    </style>
</head>

<body>

    <button onclick="addData()">Add css</button>
    <button onclick="removeData()">Remove css</button>
    <button onclick="ToggleCss()">Toggle</button>

    <h1 id="h1">Hello this Tag data</h1>


    <script>

        let h1_tag = document.getElementById("h1")

        function addData() {
            h1_tag.classList.add("st")
        }

        function removeData() {
            h1_tag.classList.remove("st")
        }

        function ToggleCss() {
            h1_tag.classList.toggle("st")
        }

    </script>
</body>

</html>
