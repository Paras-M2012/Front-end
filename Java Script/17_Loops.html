        for (let i = 1; i <= 10; i++) {
            if (i < 6) {

        for (let i = 1; i <= 10; i++) {
            if (i <= 4 || i >= 8) {

            }
        }

        
        // 5 6 7
        for(let i=1;i<=10;i++){

        for(let i=1;i<=10;i++){
