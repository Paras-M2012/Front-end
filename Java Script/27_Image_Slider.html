<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <img src="/Images/01.jpg" height="400px" width="100%" id="img" alt="">
    <button onclick="slider()">Next image</button>


    <script>

        let img_tag = document.getElementById("img")
        console.log(img_tag.src)

        function slider(){
            if(img_tag.src.match("/")){
                img_tag.src = "/"
            }
            else if(img_tag.src.match("/Java script")){
                img_tag.src = "/img/3.jpeg"
            }
            else if(img_tag.src.match("/img/3.jpeg")){
                img_tag.src = "/img/4.jpeg"
            }
            else{
                img_tag.src = "/"
            }
        }

    </script>

</body>
</html>
