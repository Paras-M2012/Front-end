<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- array : collection of multiple value store in single varibale []

        array : value, index start 0

        syntax : 

        var arr = [num,string,boolen]

        
    -->

    <script>

        let arr = [1,2,3,4,"het","paras",5,6,7]

        console.log(arr)
/         document.writeln(arr)


        // single value value[index]
        console.log(arr[3])

        console.log(arr[5])

        document.writeln(arr[5])
        document.writeln("<br>",arr[7])

        // 1) simple loop
        for(let i=0;i<arr.length;i++){
            console.log(i)
            console.log(arr[i])
            document.writeln(arr[i],"<br>")
        }

        // 2) for of : value
        for(let data of arr){
            console.log(data)
            document.writeln(data,"<br>")
        }

        // 3) for in 
        for(let data in arr){
            console.log(data)
            console.log(arr[data])
            document.writeln(`<h3> ${data} : ${arr[data]}  </h3>`)
        }


    </script>

</body>
</html>
